name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # データ本体はCloudflare R2 (公開r2.devエンドポイント) から配信するので、Pagesアーティファクトには含めない。
      - name: Strip bundled data from public/
        run: |
          rm -f public/osm_*.geojson.gz

      - name: Build
        env:
          # 末尾スラッシュ必須(main.jsで `${DATA_BASE}osm_<fclass>.geojson.gz` の形で連結する)。
          VITE_DATA_BASE: https://pub-34bad449e4ab43ea973ed5d5617595c1.r2.dev/
          # R2はオブジェクト同名で更新するため、コミットSHAをクエリに付けてブラウザ/Cloudflare CDNキャッシュを無効化する。
          VITE_DATA_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
